{% extends 'base.html' %}
{% block title %}إتمام الطلب — Youcef Shop DZ{% endblock %}
{% block content %}
<div class="container" style="margin-top:2rem;max-width:600px">
  <h1 class="section-title">📦 إتمام <span>الطلب</span></h1>
  <div class="card" style="padding:2rem">
    <form method="POST">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input name="name" value="{{ user.name }}" required>
      </div>
      <div class="form-group">
        <label>رقم الهاتف</label>
        <input name="phone" value="{{ user.phone }}" required>
      </div>
      <div class="form-group">
        <label>العنوان</label>
        <input name="address" placeholder="الولاية — البلدية" required>
      </div>
      <div style="background:var(--dark3);padding:1rem;border-radius:8px;margin-bottom:1.5rem">
        <p style="font-weight:700;margin-bottom:.5rem">💰 المبلغ الإجمالي:</p>
        <p style="color:var(--primary);font-size:1.8rem;font-weight:900">{{ total|int }} دج</p>
        <p style="color:var(--text-muted);font-size:.9rem;margin-top:.5rem">الدفع عند التوصيل أو تواصل معنا عبر واتساب</p>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">✅ تأكيد الطلب</button>
    </form>
  </div>
</div>
{% endblock %}
