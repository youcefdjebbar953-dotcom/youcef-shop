{% extends 'base.html' %}
{% block title %}إدارة المنتجات{% endblock %}
{% block content %}
<div class="container" style="margin-top:2rem">
  <h1 class="section-title">📦 إدارة <span>المنتجات</span></h1>
  <div class="card" style="padding:2rem;margin-bottom:2rem">
    <h3 style="margin-bottom:1rem">➕ إضافة منتج جديد</h3>
    <form method="POST">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group"><label>اسم المنتج</label><input name="name" required></div>
        <div class="form-group"><label>السعر (دج)</label><input name="price" type="number" required></div>
        <div class="form-group"><label>الفئة</label>
          <select name="category">
            {% for k,v in categories.items() %}<option value="{{ k }}">{{ v }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>الكمية</label><input name="stock" type="number" value="1"></div>
        <div class="form-group" style="grid-column:1/-1"><label>رابط الصورة</label><input name="image" placeholder="https://..."></div>
        <div class="form-group" style="grid-column:1/-1"><label>الوصف</label><textarea name="description" rows="3"></textarea></div>
      </div>
      <button type="submit" class="btn btn-primary">إضافة المنتج</button>
    </form>
  </div>

  {% for p in products %}
  <div class="card" style="display:flex;gap:1rem;padding:1rem;margin-bottom:.8rem;align-items:center">
    <img src="{{ p.image }}" style="width:60px;height:60px;object-fit:cover;border-radius:8px">
    <div style="flex:1">
      <p style="font-weight:700">{{ p.name }}</p>
      <p style="color:var(--primary)">{{ p.price|int }} دج | {{ categories.get(p.category) }}</p>
    </div>
    <a href="/admin/product/delete/{{ p.id }}" class="btn btn-sm" style="background:#ff444422;color:#ff4444;border:1px solid #ff4444" onclick="return confirm('تأكيد الحذف؟')">حذف</a>
  </div>
  {% endfor %}
</div>
{% endblock %}
