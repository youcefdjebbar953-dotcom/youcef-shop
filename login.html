{% extends 'base.html' %}
{% block title %}دخول — Youcef Shop DZ{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto;padding:0 1rem">
  <div class="card" style="padding:2rem">
    <h2 style="text-align:center;margin-bottom:2rem;font-size:1.5rem">👤 تسجيل <span style="color:var(--primary)">الدخول</span></h2>
    <form method="POST">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input name="email" type="email" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input name="password" type="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">دخول</button>
    </form>
    <p style="text-align:center;margin-top:1rem;color:var(--text-muted)">ما عندكش حساب؟ <a href="/register" style="color:var(--primary)">سجّل الآن</a></p>
  </div>
</div>
{% endblock %}
